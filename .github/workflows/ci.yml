name: CI Build, Test & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }} #add
  REACT_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/react-app #add
  KEYCLOAK_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/keycloak-custom #add

jobs:
  test-react:
    name: 🧪 Test React App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tasks/package-lock.json

      - name: Install dependencies
        working-directory: tasks
        run: npm ci

      - name: Run tests
        working-directory: tasks
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build React (smoke test)
        working-directory: tasks
        run: npm run build

  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test-react # only runs if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract short SHA for tagging
        id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build & push React image
        uses: docker/build-push-action@v5
        with:
          context: ./tasks
          file: ./tasks/Dockerfile
          push: true
          tags: |
            ${{ env.REACT_IMAGE }}:latest
            ${{ env.REACT_IMAGE }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # # ── Keycloak image ────────────────────────
      # # Only needed if you have a custom Keycloak Dockerfile
      # # (e.g. with realm exports or themes baked in)
      # - name: Build & push Keycloak image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./keycloak # ← adjust to your Keycloak folder
      #     file: ./keycloak/Dockerfile # ← adjust path
      #     push: true
      #     tags: |
      #       ${{ env.KEYCLOAK_IMAGE }}:latest
      #       ${{ env.KEYCLOAK_IMAGE }}:${{ steps.meta.outputs.sha }}
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max

      # ── Validate compose file ─────────────────
      - name: Validate docker-compose
        run: docker compose config
